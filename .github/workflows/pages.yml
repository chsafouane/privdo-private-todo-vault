name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_BASE: /privdo-private-todo-vault/app/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r dist _site/app

      - name: Inject latest release version
        run: |
          VERSION=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo '')
          VERSION="${VERSION#v}"
          if [ -n "$VERSION" ]; then
            sed -i "s/v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\? — Open source/v${VERSION} — Open source/" _site/index.html
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
